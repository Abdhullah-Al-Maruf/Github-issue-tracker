<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon">

    <!-- tailwind +daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon from font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- goggle font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>

    <main>
        <!-- login -->
        <section class=" flex items-center justify-center min-h-screen mt-16">
            <div>
              
    <div class="card w-96 bg-base-100 shadow-xl ">
        <div class="card-body">
                    <img src="assets/github-logo.png" alt="" class="mx-auto">
                    <div class="text-center mt-3">
                        <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
                        <p class="text-gray-500">Sign in to manage your issues</p>
                    </div>

                   <div></div>
                    <label class="label">Username</label>
                    <input id="user-name" type="text" class="input" placeholder="Enter Username" />
                    <p class="text-primary">Default: admin</p>
                    <label class="label">Password</label>
                    <input id="password" type="password" class="input" placeholder="Enter Password" />
                    <p class="text-primary">Default: admin123</p>
                    <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>

                <div class="text-center pt-3 space-y-2">
                    <div class="flex items-center my-6">
                        <!-- left line  -->
                        <div class=" flex-grow border-t border-gray-400"></div>
                        <!-- or text  -->
                        <span class="mx-4 font-medium">OR</span>
                        <!-- right line -->
                         <div class="flex-grow border-t border-gray-400">

                         </div>
                    </div>
                    <p class="text-gray-600 ">Demo Credentials:</p>
                    <div class="bg-base-200 rounded-md p-5">
                        <p>Username: admin </p>
                        <p>Password: admin123</p>
                    </div>
                </div>
                </div>
                </div>
                </fieldset>
              
            </div>

        </section>

    </main>





</body>

</html>
