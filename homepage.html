<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="shortcut icon" href="assets/Aperture.png" type="image/x-icon">

    <!-- tailwind +daisy ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon from font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- goggle font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="">
    <header class="sticky top-0 z-10">

        <div class="navbar bg-base-100 shadow-sm ">
            <div class="flex items-center  gap-1 flex-1 ">
                <img class="w-[36px]" src="assets/github-logo.png" alt="">
                <a>GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues"
                    class="input input-bordered w-24 md:w-auto" />
                <button id="search-btn" class="btn btn-primary">+ New issue</button>
            </div>
                <a class="btn mr-2 ml-2" href="./index.html"><i class="fa-solid fa-right-from-bracket"></i></a>            
        </div>
    </header>

    <main class="w-[80%] mx-auto  ">
        <!-- tab section -->
        <section class="mt-20">
            <div class="bg-white p-5 border border-gray-100 shadow-xl rounded-md">
                <button id="all-btn" class="tab-btn  btn btn-primary">All</button>
                <button id="open-btn" class="tab-btn btn btn-soft">Open</button>
                <button id="close-btn" class="tab-btn btn btn-soft ">Closed</button>
            </div>
        </section>

        <!-- issue count section -->
        <section>
            <div class="bg-white border border-gray-100 shadow-xl p-5 mt-5  rounded-md ">
                <div class=" flex  flex-col-reverse items-start  gap-8 md:flex-row justify-between items-center">
                    <!-- left div -->
                    <div class="flex items-center gap-1">
                        <img src="assets/Aperture.png" alt="">
                        <div>
                            <h2 class="font-bold text-xl">50 issues</h2>
                            <p class="text-neutral-600">Track and manage your project issues</p>
                        </div>
                    </div>
                    <!-- right div -->
                    <div class="flex gap-4">
                        <div class="flex items-center gap-1">
                            <span><img src="assets/greenCircle.png" alt=""></span>
                            <p>Open</p>
                        </div>
                        <div>
                            <div class="flex items-center gap-1">
                                <span><img src="assets/purplecircle.png" alt=""></span>
                                <p>Open</p>
                            </div>
                        </div>


                    </div>
                </div>

            </div>
        </section>
        <!-- issue card section -->
        <section class="mt-1  bg-white p-5  rounded-md ">
            <div>
            </div>

        </section>


    </main>
    <script src="script/homepage.js"></script>

</body>

</html>
